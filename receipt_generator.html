<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Test - 1st Quarter | Coffee Shop</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.3.1/core.js"></script>

    <style>
        html, body {
            height: 100%;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }
        .app-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.25);
        }
        .app-card .card-header {
            border-radius: 1rem 1rem 0 0;
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            color: #fff;
            padding: 1.5rem;
        }
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border: 1px solid #e9ecef;
            border-radius: 0.5rem;
            margin-bottom: 0.6rem;
            transition: background 0.15s ease;
        }
        .menu-item:hover {
            background: #f8f9fa;
        }
        .menu-item label {
            font-weight: 600;
            color: #333;
            margin-left: 0.6rem;
            cursor: pointer;
        }
        .menu-item .price {
            color: #0d6efd;
            font-weight: 700;
        }
        .form-check-input {
            width: 1.2em;
            height: 1.2em;
        }
        .btn-order {
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-order:hover {
            opacity: 0.9;
            color: #fff;
        }
        #show {
            min-height: 3rem;
        }
        .result-box {
            background: #f8f9fa;
            border-left: 5px solid #0d6efd;
            border-radius: 0.5rem;
            padding: 1rem 1.25rem;
        }
        .receipt-total {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: 1.3rem;
            color: #0d6efd;
        }
        py-terminal {
            display: none;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #0b2545;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                    Skewer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">
                            <i class="fa-solid fa-barcode me-1"></i> SKU Generator
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="receipt_generator.html">
                            <i class="fa-solid fa-circle-info me-1"></i> Receipt Generaotr
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">

                <div class="card app-card">
                    <div class="card-header text-center">
                        <i class="fa-solid fa-mug-hot fa-2x mb-2"></i>
                        <h3 class="mb-0">OBMC Entrep Fair</h3>
                        <small class="opacity-75">Group 1 &mdash; Coffee Shop</small>
                    </div>

                    <div class="card-body p-4">
                        <h5 class="mb-3">
                            <i class="fa-solid fa-list-check me-1"></i> Menu
                        </h5>

                        <form id="order-form">
                            <div class="menu-item">
                                <div>
                                    <input class="form-check-input" type="checkbox" id="item1" value="99">
                                    <label id="item1-label" for="item1">Americano</label>
                                </div>
                                <span class="price">₱99</span>
                            </div>

                            <div class="menu-item">
                                <div>
                                    <input class="form-check-input" type="checkbox" id="item2" value="129">
                                    <label id="item2-label" for="item2">Spanish Latte</label>
                                </div>
                                <span class="price">₱129</span>
                            </div>

                            <div class="menu-item">
                                <div>
                                    <input class="form-check-input" type="checkbox" id="item3" value="189">
                                    <label id="item3-label" for="item3">Cold Brew Malt</label>
                                </div>
                                <span class="price">₱189</span>
                            </div>

                            <div class="menu-item">
                                <div>
                                    <input class="form-check-input" type="checkbox" id="item4" value="159">
                                    <label id="item4-label" for="item4">Affogato</label>
                                </div>
                                <span class="price">₱159</span>
                            </div>

                            <div class="menu-item">
                                <div>
                                    <input class="form-check-input" type="checkbox" id="item5" value="129">
                                    <label id="item5-label" for="item5">Caramel Macchiato</label>
                                </div>
                                <span class="price">₱129</span>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="button" py-click="create_order" class="btn btn-order btn-lg text-white">
                                    <i class="fa-solid fa-receipt me-1"></i> Create Order
                                </button>
                            </div>
                        </form>

                        <hr class="my-4">

                        <div id="show">
                            <p class="text-muted text-center mb-0">Your order summary will appear here.</p>
                        </div>
                    </div>

                    <div class="card-footer text-center text-muted small py-3">
                        Select your items and click "Create Order"
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="text-center text-light py-4" style="background-color: #0b2545;">
        <div class="container">
            <p class="mb-1">
                <i class="fa-solid fa-code me-1"></i>
                SKU Generator &mdash; 1st Quarter Project
            </p>
        </div>
    </footer>

    <py-script src="main.py"></py-script>

    <!-- Bootstrap JS bundle (needed for navbar toggle on mobile) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
