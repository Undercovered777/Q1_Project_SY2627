<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1st Quarter Project | SKU Generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.3.1/core.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .app-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.25);
        }
        .app-card .card-header {
            border-radius: 1rem 1rem 0 0;
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            color: #fff;
            padding: 1.5rem;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .btn-generate {
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-generate:hover {
            opacity: 0.9;
            color: #fff;
        }
        #sku_output {
            min-height: 3rem;
        }
        .result-box {
            background: #f8f9fa;
            border-left: 5px solid #0d6efd;
            border-radius: 0.5rem;
            padding: 1rem 1.25rem;
        }
        .sku-code {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: 1.3rem;
            color: #0d6efd;
            letter-spacing: 1px;
        }   
        py-terminal {
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #0b2545;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                    Skewer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">
                            <i class="fa-solid fa-barcode me-1"></i> SKU Generator
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="receipt_generator.html">
                            <i class="fa-solid fa-circle-info me-1"></i> Receipt Generaotr
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">

                <div class="card app-card">
                    <div class="card-header text-center">
                        <i class="fa-solid fa-barcode fa-2x mb-2"></i>
                        <h3 class="mb-0">SKU Generator</h3>
                    </div>

                    <div class="card-body p-4">
                        <form id="sku-form">
                            <div class="mb-3">
                                <label for="category" class="form-label">
                                    <i class="fa-solid fa-tags me-1"></i> Category
                                </label>
                                <select id="category" class="form-select">
                                    <option value="Perishables">Perishables</option>
                                    <option value="Beverages">Beverages</option>
                                    <option value="Disposables">Disposables</option>
                                    <option value="Packaging">Packaging</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="product_name" class="form-label">
                                    <i class="fa-solid fa-box me-1"></i> Product Name
                                </label>
                                <input type="text" id="product_name" class="form-control" placeholder="e.g. Bottled Water">
                            </div>

                            <div class="mb-4">
                                <label for="quantity" class="form-label">
                                    <i class="fa-solid fa-warehouse me-1"></i> Stock Quantity
                                </label>
                                <input type="number" id="quantity" class="form-control" placeholder="e.g. 50" min="0">
                            </div>

                            <div class="d-grid">
                                <input type="button" py-click="SKU_generator" value="Generate SKU"
                                       class="btn btn-generate btn-lg text-white">
                            </div>
                        </form>

                        <hr class="my-4">

                        <b><div id="sku_output">
                            <p class="text-muted text-center mb-0">Your generated SKU will appear here.</p>
                        </div></b>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <footer class="text-center text-light py-4" style="background-color: #0b2545;">
        <div class="container">
            <p class="mb-1">
                <i class="fa-solid fa-code me-1"></i>
                SKU Generator &mdash; 1st Quarter Project
            </p>
        </div>
    </footer>
    <py-script src="main.py"></py-script>
</body>
</html>
